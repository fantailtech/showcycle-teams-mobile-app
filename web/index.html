<!DOCTYPE html>
<html>

<head>
    <title>Site Portal</title>

    <!-- Teams SDK -->
    <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f3f2f1;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #464775;
            margin-bottom: 16px;
        }

        p {
            color: #333;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            background-color: #6264A7;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }

        button:hover {
            background-color: #464775;
        }

        #loading {
            color: #6264A7;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 id="title">Loading...</h2>

        <div id="selector" style="display:none;">
            <p>Select your site:</p>
            <select id="siteSelect"></select>
            <button onclick="saveSelection()">Continue</button>
        </div>
    </div>

    <script>
        const CONFIG_URL = "https://raw.githubusercontent.com/fantailtech/showcycle-teams-mobile-app/refs/heads/master/config.json";

        let userEmail = "";
        let userName = "";

        async function init() {
            const isInTeams = window.self !== window.top;

            if (isInTeams) {
                try {
                    await microsoftTeams.app.initialize();

                    const context = await microsoftTeams.app.getContext();

                    userEmail = context.user?.userPrincipalName || "";
                    userName = context.user?.displayName || "";

                } catch (e) {
                    console.warn("Teams init failed:", e);
                }
            }

            const savedUrl = localStorage.getItem("selectedUrl");

            if (savedUrl) {
                redirect(savedUrl);
                return;
            }

            loadSites();
        }

        async function loadSites() {
            try {
                const res = await fetch(CONFIG_URL);
                const data = await res.json();

                const select = document.getElementById("siteSelect");

                data.sites.forEach(site => {
                    const option = document.createElement("option");
                    option.value = site.url;
                    option.text = site.name;
                    select.appendChild(option);
                });

                document.getElementById("title").innerText = "Select Site";
                document.getElementById("selector").style.display = "block";

            } catch (err) {
                document.getElementById("title").innerText = "Failed to load config";
            }
        }

        function saveSelection() {
            const url = document.getElementById("siteSelect").value;

            if (!url.startsWith("https://")) {
                alert("Invalid URL");
                return;
            }

            localStorage.setItem("selectedUrl", url);
            redirect(url);
        }

        function redirect(url) {
            let finalUrl = url;

            if (userEmail || userName) {
                const params = new URLSearchParams();

                if (userEmail) params.append("email", userEmail);
                if (userName) params.append("name", userName);

                finalUrl += (url.includes("?") ? "&" : "?") + params.toString();
            }

            window.location.href = finalUrl;
        }

        init();
    </script>
</body>

</html>
