<!DOCTYPE html>
<html>

<head>
    <title>Site Portal</title>

    <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f3f2f1;
            margin: 0;
        }

        .container {
            max-width: 420px;
            margin: 80px auto;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #464775;
            margin-bottom: 16px;
        }

        p {
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
        }

        button {
            background-color: #6264A7;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        button.secondary {
            background-color: #e1dfdd;
            color: #333;
        }

        .loader {
            margin: 20px 0;
        }

        .progress-bar {
            height: 6px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #6264A7;
            transition: width 2s linear;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- Loading Screen -->
        <div id="loadingScreen" style="display:none;">
            <h2 id="loadingTitle">Loading...</h2>
            <div class="loader">
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>
            <button class="secondary" onclick="cancelLoading()">Stop</button>
        </div>

        <!-- Selector -->
        <div id="selector" style="display:none;">
            <h2>Select Site</h2>
            <p>Select your site:</p>
            <select id="siteSelect"></select>
            <button onclick="saveSelection()">Continue</button>
        </div>

    </div>

    <script>
        const CONFIG_URL = "https://raw.githubusercontent.com/fantailtech/showcycle-teams-mobile-app/refs/heads/master/config.json";

        let userEmail = "";
        let userName = "";
        let selectedSiteName = "";

        async function init() {
            const isInTeams = window.self !== window.top;

            if (isInTeams) {
                try {
                    await microsoftTeams.app.initialize();
                    const context = await microsoftTeams.app.getContext();

                    userEmail = context.user?.userPrincipalName || "";
                    userName = context.user?.displayName || "";

                } catch (e) {
                    console.warn("Teams init failed:", e);
                }
            }

            const savedUrl = localStorage.getItem("selectedUrl");
            const savedName = localStorage.getItem("selectedName");

            if (savedUrl && savedName) {
                selectedSiteName = savedName;
                showLoadingAndRedirect(savedUrl); // ✅ ONLY here we show loader
                return;
            }

            loadSites();
        }

        async function loadSites() {
            try {
                const res = await fetch(CONFIG_URL);
                const data = await res.json();

                const select = document.getElementById("siteSelect");

                data.sites.forEach(site => {
                    const option = document.createElement("option");
                    option.value = site.url;
                    option.text = site.name;
                    select.appendChild(option);
                });

                document.getElementById("selector").style.display = "block";

            } catch (err) {
                document.getElementById("selector").innerText = "Failed to load config";
            }
        }

        function saveSelection() {
            const select = document.getElementById("siteSelect");
            const url = select.value;
            const name = select.options[select.selectedIndex].text;

            if (!url.startsWith("https://")) {
                alert("Invalid URL");
                return;
            }

            localStorage.setItem("selectedUrl", url);
            localStorage.setItem("selectedName", name);

            selectedSiteName = name;

            // ✅ Immediate redirect (NO loader)
            redirect(url);
        }

        function showLoadingAndRedirect(url) {
            document.getElementById("selector").style.display = "none";
            document.getElementById("loadingScreen").style.display = "block";

            document.getElementById("loadingTitle").innerText = `Loading ${selectedSiteName}`;

            const progress = document.getElementById("progress");

            // Reset + animate
            progress.style.width = "0%";
            setTimeout(() => {
                progress.style.width = "100%";
            }, 50);

            setTimeout(() => {
                redirect(url);
            }, 2000);
        }

        function cancelLoading() {
            localStorage.removeItem("selectedUrl");
            localStorage.removeItem("selectedName");

            location.reload();
        }

        function redirect(url) {
            let finalUrl = url;

            if (userEmail || userName) {
                const params = new URLSearchParams();

                if (userEmail) params.append("email", userEmail);
                if (userName) params.append("name", userName);

                finalUrl += (url.includes("?") ? "&" : "?") + params.toString();
            }

            console.log("Redirecting to:", finalUrl); // 🔍 Debug

            window.location.href = finalUrl;
        }

        init();
    </script>
</body>

</html>
