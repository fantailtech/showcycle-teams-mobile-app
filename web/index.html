<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport"
		content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
	<meta name="theme-color" content="#1f1f1f" />
	<title>ShowCycle</title>

	<script src="https://res.cdn.office.net/teams-js/2.50.0/js/MicrosoftTeams.min.js"></script>

	<style>
		:root {
			--bg: #1a1a1a;
			--bg-elev: #242424;
			--bg-elev-2: #2d2d2d;
			--surface: #2b2b2b;
			--surface-hover: #353535;
			--border: rgba(255, 255, 255, 0.06);
			--border-strong: rgba(255, 255, 255, 0.12);
			--text: #f3f2f1;
			--text-muted: #a8a8a8;
			--text-dim: #8a8a8a;
			--accent: #8a8fe8;
			--accent-strong: #6264a7;
			--accent-glow: rgba(138, 143, 232, 0.35);
			--danger: #f87171;
			--shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.2);
			--shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
			--radius-tile: 16px;
			--radius-card: 20px;
			--safe-top: env(safe-area-inset-top, 0px);
			--safe-bottom: env(safe-area-inset-bottom, 0px);
			--safe-left: env(safe-area-inset-left, 0px);
			--safe-right: env(safe-area-inset-right, 0px);
		}

		@media (prefers-color-scheme: light) {
			:root {
				--bg: #f5f5f7;
				--bg-elev: #ffffff;
				--bg-elev-2: #ffffff;
				--surface: #ffffff;
				--surface-hover: #f0f0f2;
				--border: rgba(0, 0, 0, 0.06);
				--border-strong: rgba(0, 0, 0, 0.12);
				--text: #1a1a1a;
				--text-muted: #5a5a5a;
				--text-dim: #8a8a8a;
				--accent: #6264a7;
				--accent-strong: #464775;
				--accent-glow: rgba(98, 100, 167, 0.25);
				--shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
				--shadow-md: 0 6px 20px rgba(0, 0, 0, 0.08);
			}
		}

		* {
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			height: 100%;
			background: var(--bg);
			color: var(--text);
			font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
			font-size: 15px;
			line-height: 1.4;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
			overscroll-behavior-y: contain;
		}

		body {
			background:
				radial-gradient(1200px 600px at 50% -10%, var(--accent-glow), transparent 60%),
				var(--bg);
			min-height: 100vh;
			min-height: 100dvh;
			padding:
				calc(var(--safe-top) + 8px)
				var(--safe-right)
				var(--safe-bottom)
				var(--safe-left);
		}

		.app {
			max-width: 560px;
			margin: 0 auto;
			padding: 16px 20px 40px;
		}

		/* Header */
		.header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 8px 4px 20px;
		}

		.brand {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.brand-mark {
			width: 36px;
			height: 36px;
			border-radius: 10px;
			background: linear-gradient(135deg, #8a8fe8 0%, #6264a7 100%);
			display: grid;
			place-items: center;
			color: #fff;
			font-weight: 700;
			font-size: 16px;
			box-shadow: 0 4px 14px var(--accent-glow);
		}

		.brand-title {
			font-size: 22px;
			font-weight: 700;
			letter-spacing: -0.2px;
			color: var(--text);
		}

		/* Section */
		.section {
			margin-top: 24px;
			opacity: 0;
			transform: translateY(8px);
			animation: sectionIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
		}

		.section:nth-of-type(2) { animation-delay: 0.08s; }

		@keyframes sectionIn {
			to { opacity: 1; transform: none; }
		}

		.section-head {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-bottom: 14px;
			padding: 0 2px;
		}

		.section-title {
			font-size: 13px;
			font-weight: 600;
			color: var(--text-muted);
			text-transform: uppercase;
			letter-spacing: 0.6px;
			white-space: nowrap;
		}

		.section-rule {
			flex: 1;
			height: 1px;
			background: var(--border-strong);
		}

		.section-count {
			font-size: 11px;
			color: var(--text-dim);
			background: var(--surface);
			border: 1px solid var(--border);
			padding: 2px 8px;
			border-radius: 999px;
			font-weight: 600;
		}

		/* Grid */
		.grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 14px 12px;
		}

		@media (max-width: 340px) {
			.grid { grid-template-columns: repeat(2, 1fr); }
		}

		@media (min-width: 480px) {
			.grid { grid-template-columns: repeat(4, 1fr); gap: 18px 14px; }
		}

		/* Tile */
		.tile {
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			padding: 4px 2px 6px;
			border: none;
			background: transparent;
			color: inherit;
			font: inherit;
			cursor: pointer;
			border-radius: 12px;
			outline: none;
			transition: transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
			opacity: 0;
			transform: translateY(10px);
			animation: tileIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
			animation-delay: calc(var(--i, 0) * 40ms + 120ms);
		}

		@keyframes tileIn {
			to { opacity: 1; transform: none; }
		}

		.tile:focus-visible {
			box-shadow: 0 0 0 2px var(--accent);
		}

		.tile:active {
			transform: scale(0.96);
		}

		.tile-logo {
			width: 100%;
			aspect-ratio: 1 / 1;
			max-width: 84px;
			border-radius: var(--radius-tile);
			background: var(--surface);
			display: grid;
			place-items: center;
			position: relative;
			overflow: hidden;
			box-shadow: var(--shadow-sm);
			border: 1px solid var(--border);
			transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
		}

		.tile:hover .tile-logo {
			box-shadow: var(--shadow-md);
			border-color: var(--border-strong);
		}

		.tile-logo img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.tile-fallback {
			width: 100%;
			height: 100%;
			display: grid;
			place-items: center;
			font-weight: 700;
			font-size: 24px;
			color: #fff;
			letter-spacing: -0.5px;
			text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
		}

		.tile-past .tile-logo {
			filter: saturate(0.75);
		}

		.tile-past .tile-logo::after {
			content: "";
			position: absolute;
			inset: 0;
			background: rgba(0, 0, 0, 0.18);
			pointer-events: none;
		}

		.tile-name {
			margin-top: 9px;
			font-size: 12.5px;
			font-weight: 600;
			color: var(--text);
			line-height: 1.25;
			max-width: 100%;
			display: -webkit-box;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			overflow: hidden;
			word-break: break-word;
			padding: 0 2px;
		}

		.tile-date {
			margin-top: 3px;
			font-size: 10.5px;
			font-weight: 500;
			color: var(--text-dim);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 100%;
			padding: 0 2px;
		}

		.tile-live {
			position: absolute;
			top: 6px;
			right: 6px;
			background: #22c55e;
			color: #fff;
			font-size: 9px;
			font-weight: 700;
			padding: 2px 6px;
			border-radius: 999px;
			letter-spacing: 0.4px;
			box-shadow: 0 2px 6px rgba(34, 197, 94, 0.45);
			text-transform: uppercase;
		}

		.tile-active .tile-logo {
			box-shadow: 0 0 0 2px var(--accent), 0 8px 24px var(--accent-glow);
			border-color: transparent;
		}

		.tile-active-badge {
			position: absolute;
			bottom: 6px;
			right: 6px;
			width: 20px;
			height: 20px;
			border-radius: 999px;
			background: var(--accent);
			color: #fff;
			display: grid;
			place-items: center;
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
			border: 2px solid var(--bg);
		}

		.tile-active-badge svg {
			width: 10px;
			height: 10px;
			stroke-width: 3;
		}

		.tile-live::before {
			content: "";
			display: inline-block;
			width: 5px;
			height: 5px;
			background: #fff;
			border-radius: 999px;
			margin-right: 4px;
			vertical-align: 1px;
			animation: pulseDot 1.6s ease-in-out infinite;
		}

		@keyframes pulseDot {
			0%, 100% { opacity: 0.6; }
			50% { opacity: 1; }
		}

		/* Skeleton */
		.skeleton-grid { pointer-events: none; }

		.skeleton {
			background: linear-gradient(90deg,
				var(--surface) 0%,
				var(--surface-hover) 50%,
				var(--surface) 100%);
			background-size: 200% 100%;
			animation: shimmer 1.4s linear infinite;
			border-radius: var(--radius-tile);
		}

		.skeleton-logo {
			width: 100%;
			aspect-ratio: 1 / 1;
			max-width: 84px;
		}

		.skeleton-line {
			height: 10px;
			border-radius: 5px;
			margin-top: 10px;
			width: 80%;
		}

		.skeleton-line.short { width: 55%; margin-top: 6px; height: 8px; }

		@keyframes shimmer {
			0% { background-position: 200% 0; }
			100% { background-position: -200% 0; }
		}

		/* Empty + error */
		.state-card {
			margin-top: 18px;
			padding: 28px 20px;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius-card);
			text-align: center;
		}

		.state-icon {
			width: 48px;
			height: 48px;
			margin: 0 auto 14px;
			border-radius: 14px;
			background: var(--bg-elev-2);
			display: grid;
			place-items: center;
			color: var(--accent);
		}

		.state-title {
			font-size: 15px;
			font-weight: 600;
			margin: 0 0 4px;
		}

		.state-desc {
			font-size: 13px;
			color: var(--text-muted);
			margin: 0;
		}

		.state-action {
			margin-top: 16px;
		}

		/* Buttons */
		.btn {
			border: none;
			background: var(--accent-strong);
			color: #fff;
			padding: 11px 18px;
			border-radius: 10px;
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
			transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
			font-family: inherit;
		}

		.btn:hover { background: var(--accent); }
		.btn:active { transform: scale(0.97); }

		.btn-secondary {
			background: var(--surface);
			color: var(--text);
			border: 1px solid var(--border-strong);
		}

		.btn-secondary:hover { background: var(--surface-hover); }

		/* Loading overlay */
		.loader-overlay {
			position: fixed;
			inset: 0;
			display: none;
			align-items: center;
			justify-content: center;
			padding:
				calc(var(--safe-top) + 16px)
				calc(var(--safe-right) + 20px)
				calc(var(--safe-bottom) + 16px)
				calc(var(--safe-left) + 20px);
			background:
				radial-gradient(700px 400px at 50% 30%, var(--accent-glow), transparent 60%),
				var(--bg);
			z-index: 100;
			opacity: 0;
			transition: opacity 0.35s ease;
		}

		.loader-overlay.show {
			display: flex;
			opacity: 1;
		}

		.loader-card {
			width: 100%;
			max-width: 340px;
			text-align: center;
			animation: loaderIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
		}

		@keyframes loaderIn {
			from { opacity: 0; transform: translateY(8px) scale(0.98); }
			to { opacity: 1; transform: none; }
		}

		.loader-logo {
			width: 96px;
			height: 96px;
			margin: 0 auto 24px;
			border-radius: 24px;
			overflow: hidden;
			position: relative;
			box-shadow: 0 14px 40px var(--accent-glow), 0 4px 12px rgba(0, 0, 0, 0.3);
			animation: floatLogo 2.6s ease-in-out infinite;
		}

		.loader-logo img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		.loader-logo .tile-fallback {
			font-size: 32px;
		}

		@keyframes floatLogo {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-6px); }
		}

		.loader-logo::after {
			content: "";
			position: absolute;
			inset: -2px;
			border-radius: inherit;
			background: conic-gradient(from 0deg,
				transparent 0deg,
				var(--accent) 90deg,
				transparent 220deg);
			animation: spin 1.6s linear infinite;
			z-index: -1;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		.loader-title {
			font-size: 20px;
			font-weight: 700;
			margin: 0 0 6px;
			letter-spacing: -0.2px;
		}

		.loader-subtitle {
			font-size: 13px;
			color: var(--text-muted);
			margin: 0 0 26px;
		}

		.loader-bar {
			height: 4px;
			background: var(--surface);
			border-radius: 999px;
			overflow: hidden;
			margin-bottom: 22px;
		}

		.loader-bar-fill {
			height: 100%;
			width: 0%;
			background: linear-gradient(90deg, var(--accent-strong), var(--accent));
			border-radius: inherit;
			transition: width 1.8s cubic-bezier(0.2, 0.6, 0.2, 1);
		}

		/* Utility */
		.hidden { display: none !important; }
		.fade-out { animation: fadeOut 0.25s ease forwards; }

		@keyframes fadeOut {
			to { opacity: 0; transform: translateY(-4px); }
		}

		@media (prefers-reduced-motion: reduce) {
			*,
			*::before,
			*::after {
				animation-duration: 0.001s !important;
				animation-delay: 0s !important;
				transition-duration: 0.001s !important;
			}
		}
	</style>
</head>

<body>
	<main class="app" id="app">
		<header class="header">
			<div class="brand">
				<div class="brand-mark" aria-hidden="true">SC</div>
				<div class="brand-title">ShowCycle</div>
			</div>
		</header>

		<!-- Home empty (Home tab, no saved show) -->
		<div class="state-card hidden" id="homeEmpty">
			<div class="state-icon" aria-hidden="true">
				<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M3 12l9-9 9 9"></path>
					<path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"></path>
				</svg>
			</div>
			<h3 class="state-title">Nothing here yet</h3>
			<p class="state-desc">Pick a show to open it here.</p>
			<div class="state-action">
				<button class="btn" type="button" id="goToShowsBtn">Browse shows</button>
			</div>
		</div>

		<!-- Skeleton while loading -->
		<section class="section" id="skeletonSection" aria-hidden="true">
			<div class="grid skeleton-grid" id="skeletonGrid"></div>
		</section>

		<!-- Upcoming shows -->
		<section class="section hidden" id="upcomingSection" aria-labelledby="upcomingTitle">
			<div class="section-head">
				<div class="section-title" id="upcomingTitle">Upcoming</div>
				<div class="section-rule"></div>
				<div class="section-count" id="upcomingCount">0</div>
			</div>
			<div class="grid" id="upcomingGrid" role="list"></div>
		</section>

		<!-- Past events -->
		<section class="section hidden" id="pastSection" aria-labelledby="pastTitle">
			<div class="section-head">
				<div class="section-title" id="pastTitle">Past</div>
				<div class="section-rule"></div>
				<div class="section-count" id="pastCount">0</div>
			</div>
			<div class="grid" id="pastGrid" role="list"></div>
		</section>

		<!-- Empty state -->
		<div class="state-card hidden" id="emptyState">
			<div class="state-icon" aria-hidden="true">
				<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<rect x="3" y="4" width="18" height="18" rx="3"></rect>
					<path d="M16 2v4M8 2v4M3 10h18"></path>
				</svg>
			</div>
			<h3 class="state-title">No shows to open</h3>
			<p class="state-desc">Shows will appear here once your team adds one.</p>
		</div>

		<!-- Error state -->
		<div class="state-card hidden" id="errorState">
			<div class="state-icon" aria-hidden="true" style="color: var(--danger);">
				<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<circle cx="12" cy="12" r="10"></circle>
					<path d="M12 8v4M12 16h.01"></path>
				</svg>
			</div>
			<h3 class="state-title">Couldn't load shows</h3>
			<p class="state-desc" id="errorDesc">Check your connection.</p>
			<div class="state-action">
				<button class="btn" type="button" onclick="loadSites()">Try again</button>
			</div>
		</div>
	</main>

	<!-- Loader overlay -->
	<div class="loader-overlay" id="loaderOverlay" role="dialog" aria-modal="true"
		aria-labelledby="loaderTitle">
		<div class="loader-card">
			<div class="loader-logo" id="loaderLogo" aria-hidden="true"></div>
			<h2 class="loader-title" id="loaderTitle">Opening…</h2>
			<p class="loader-subtitle" id="loaderSubtitle">Just a moment</p>
			<div class="loader-bar">
				<div class="loader-bar-fill" id="loaderFill"></div>
			</div>
			<button class="btn btn-secondary" type="button" onclick="cancelLoading()">Cancel</button>
		</div>
	</div>

	<script>
		const CONFIG_URL = "https://raw.githubusercontent.com/fantailtech/showcycle-teams-mobile-app/refs/heads/master/config.json";
		const TEAMS_CONTEXT_TIMEOUT_MS = 1500;
		const REDIRECT_DELAY_MS = 1600;

		const GRADIENTS = [
			["#6264A7", "#8A8FE8"],
			["#E8516B", "#F5876E"],
			["#16A085", "#2ECC71"],
			["#F39C12", "#E67E22"],
			["#3498DB", "#5DADE2"],
			["#9B59B6", "#C879D9"],
			["#E74C3C", "#F16572"],
			["#1ABC9C", "#48D1C8"],
			["#F06292", "#F48FB1"],
			["#5C6BC0", "#7986CB"]
		];

		const VIEW_HOME = "home";
		const VIEW_SHOWS = "shows";

		let userEmail = "";
		let userName = "";
		let teamsAppId = "";
		let view = VIEW_HOME;
		let selectedSite = null;
		let redirectTimer = null;

		document.addEventListener("DOMContentLoaded", init);

		async function init() {
			view = readView();
			document.body.setAttribute("data-view", view);

			wireStaticButtons();

			if (view === VIEW_SHOWS) {
				await initializeTeamsContextIfAvailable();
				loadSites();
				return;
			}

			hideSkeleton();
			await initializeTeamsContextIfAvailable();

			const saved = getSavedSite();
			if (saved) {
				selectedSite = saved;
				showLoadingAndRedirect(saved);
				return;
			}

			showHomeEmpty();
		}

		function readView() {
			const params = new URLSearchParams(window.location.search);
			const raw = (params.get("view") || "").toLowerCase();
			if (raw === VIEW_SHOWS) return VIEW_SHOWS;
			return VIEW_HOME;
		}

		function wireStaticButtons() {
			const go = document.getElementById("goToShowsBtn");
			if (go) go.addEventListener("click", () => navigateToTab(VIEW_SHOWS));
		}

		function getSavedSite() {
			const url = localStorage.getItem("selectedUrl");
			const name = localStorage.getItem("selectedName");
			if (!url || !name) return null;
			return {
				url,
				name,
				logoUrl: localStorage.getItem("selectedLogo") || ""
			};
		}

		function showHomeEmpty() {
			document.getElementById("homeEmpty").classList.remove("hidden");
		}

		function hideHomeEmpty() {
			document.getElementById("homeEmpty").classList.add("hidden");
		}

		async function navigateToTab(pageId) {
			try {
				if (window.microsoftTeams?.pages?.currentApp?.navigateTo) {
					await microsoftTeams.pages.currentApp.navigateTo({ pageId });
					return true;
				}
				if (teamsAppId && window.microsoftTeams?.pages?.navigateToApp) {
					await microsoftTeams.pages.navigateToApp({ appId: teamsAppId, pageId });
					return true;
				}
			} catch (e) {
				console.warn("navigateToTab failed:", e);
			}
			const url = new URL(window.location.href);
			url.searchParams.set("view", pageId);
			window.location.href = url.toString();
			return false;
		}

		async function initializeTeamsContextIfAvailable() {
			if (!shouldAttemptTeamsInit() || !window.microsoftTeams?.app?.initialize) return;

			try {
				await withTimeout(
					microsoftTeams.app.initialize(),
					TEAMS_CONTEXT_TIMEOUT_MS,
					"Teams initialize"
				);
				const context = await withTimeout(
					microsoftTeams.app.getContext(),
					TEAMS_CONTEXT_TIMEOUT_MS,
					"Teams getContext"
				);
				userEmail =
					context.user?.userPrincipalName ||
					context.user?.loginHint ||
					"";
				userName = context.user?.displayName || "";
				teamsAppId = context.app?.appId || context.app?.id || "";
			} catch (e) {
				console.warn("Teams context unavailable:", e);
			}
		}

		function shouldAttemptTeamsInit() {
			const params = new URLSearchParams(window.location.search);
			if (params.get("inTeams") === "1") return true;

			const referrer = document.referrer || "";
			const userAgent = navigator.userAgent || "";
			return /Teams|TeamsMobile/i.test(userAgent) ||
				/teams\.microsoft\.com|teams\.cloud\.microsoft|microsoft365\.com|office\.com/i.test(referrer);
		}

		function withTimeout(promise, timeoutMs, label) {
			return Promise.race([
				promise,
				new Promise((_, reject) => {
					window.setTimeout(() => reject(new Error(`${label} timed out`)), timeoutMs);
				})
			]);
		}

		function renderSkeleton() {
			const grid = document.getElementById("skeletonGrid");
			grid.innerHTML = "";
			for (let i = 0; i < 6; i++) {
				const cell = document.createElement("div");
				cell.className = "tile";
				cell.style.setProperty("--i", i);
				cell.innerHTML = `
					<div class="skeleton skeleton-logo"></div>
					<div class="skeleton skeleton-line"></div>
					<div class="skeleton skeleton-line short"></div>
				`;
				grid.appendChild(cell);
			}
		}

		function hideSkeleton() {
			document.getElementById("skeletonSection").classList.add("hidden");
		}

		async function loadSites() {
			document.getElementById("errorState").classList.add("hidden");
			document.getElementById("emptyState").classList.add("hidden");
			document.getElementById("upcomingSection").classList.add("hidden");
			document.getElementById("pastSection").classList.add("hidden");
			document.getElementById("skeletonSection").classList.remove("hidden");
			renderSkeleton();

			try {
				const res = await fetch(CONFIG_URL, { cache: "no-store" });
				if (!res.ok) throw new Error(`HTTP ${res.status}`);
				const data = await res.json();
				const sites = Array.isArray(data?.sites) ? data.sites : [];

				const today = startOfToday();
				const published = sites.filter(s => s && s.publish === true && typeof s.url === "string");

				const { upcoming, past } = partitionShows(published, today);

				renderSection("upcoming", upcoming);
				renderSection("past", past);

				hideSkeleton();

				const hasAny = upcoming.length > 0 || past.length > 0;
				if (!hasAny) {
					document.getElementById("emptyState").classList.remove("hidden");
				}
			} catch (err) {
				console.error("Failed to load sites:", err);
				hideSkeleton();
				document.getElementById("errorDesc").textContent =
					"Check your connection.";
				document.getElementById("errorState").classList.remove("hidden");
			}
		}

		function startOfToday() {
			const d = new Date();
			d.setHours(0, 0, 0, 0);
			return d;
		}

		function parseDate(str) {
			if (!str || typeof str !== "string") return null;
			const m = /^(\d{4})-(\d{1,2})-(\d{1,2})/.exec(str.trim());
			if (m) {
				const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
				return isNaN(d.getTime()) ? null : d;
			}
			const parsed = new Date(str);
			return isNaN(parsed.getTime()) ? null : parsed;
		}

		function partitionShows(sites, today) {
			const upcoming = [];
			const past = [];

			for (const site of sites) {
				const start = parseDate(site.startDate);
				const end = parseDate(site.endDate) || start;

				if (end && end >= today) {
					upcoming.push({ ...site, _start: start, _end: end });
				} else {
					past.push({ ...site, _start: start, _end: end });
				}
			}

			upcoming.sort((a, b) => {
				const at = a._start ? a._start.getTime() : Infinity;
				const bt = b._start ? b._start.getTime() : Infinity;
				return at - bt;
			});

			past.sort((a, b) => {
				const at = a._start ? a._start.getTime() : -Infinity;
				const bt = b._start ? b._start.getTime() : -Infinity;
				return bt - at;
			});

			return { upcoming, past };
		}

		function renderSection(kind, items) {
			const sectionId = kind === "upcoming" ? "upcomingSection" : "pastSection";
			const gridId = kind === "upcoming" ? "upcomingGrid" : "pastGrid";
			const countId = kind === "upcoming" ? "upcomingCount" : "pastCount";
			const section = document.getElementById(sectionId);
			const grid = document.getElementById(gridId);
			const count = document.getElementById(countId);

			grid.innerHTML = "";
			count.textContent = String(items.length);

			if (items.length === 0) {
				section.classList.add("hidden");
				return;
			}

			section.classList.remove("hidden");

			const today = startOfToday();

			items.forEach((site, i) => {
				const tile = createTile(site, i, kind, today);
				grid.appendChild(tile);
			});
		}

		function createTile(site, index, kind, today) {
			const saved = getSavedSite();
			const isActive = !!(saved && saved.url === site.url);

			const btn = document.createElement("button");
			btn.type = "button";
			let cls = "tile";
			if (kind === "past") cls += " tile-past";
			if (isActive) cls += " tile-active";
			btn.className = cls;
			btn.setAttribute("role", "listitem");
			btn.style.setProperty("--i", index);
			btn.setAttribute("aria-label", buildAriaLabel(site, isActive));
			btn.addEventListener("click", () => onTileClick(site));

			const logoWrap = document.createElement("div");
			logoWrap.className = "tile-logo";
			logoWrap.appendChild(buildLogo(site));

			if (kind === "upcoming" && isLive(site, today)) {
				const live = document.createElement("span");
				live.className = "tile-live";
				live.textContent = "LIVE";
				logoWrap.appendChild(live);
			}

			if (isActive) {
				const badge = document.createElement("span");
				badge.className = "tile-active-badge";
				badge.setAttribute("aria-hidden", "true");
				badge.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
				logoWrap.appendChild(badge);
			}

			const name = document.createElement("div");
			name.className = "tile-name";
			name.textContent = site.name || "Untitled show";

			const date = document.createElement("div");
			date.className = "tile-date";
			date.textContent = formatDateRange(site._start, site._end);

			btn.appendChild(logoWrap);
			btn.appendChild(name);
			if (date.textContent) btn.appendChild(date);

			return btn;
		}

		function buildAriaLabel(site, isActive) {
			const parts = [site.name || "Show"];
			const range = formatDateRange(site._start, site._end);
			if (range) parts.push(range);
			if (isActive) parts.push("currently open");
			return parts.join(", ");
		}

		function isLive(site, today) {
			if (!site._start || !site._end) return false;
			return site._start <= today && site._end >= today;
		}

		function buildLogo(site) {
			const hasLogo = typeof site.logoUrl === "string" && site.logoUrl.trim() !== "";

			if (hasLogo) {
				const img = document.createElement("img");
				img.alt = "";
				img.loading = "lazy";
				img.decoding = "async";
				img.referrerPolicy = "no-referrer";
				img.src = site.logoUrl.trim();
				img.onerror = () => {
					const fb = buildFallbackLogo(site.name || "?");
					img.replaceWith(fb);
				};
				return img;
			}

			return buildFallbackLogo(site.name || "?");
		}

		function buildFallbackLogo(name) {
			const wrap = document.createElement("div");
			wrap.className = "tile-fallback";
			const [a, b] = gradientFor(name);
			wrap.style.background = `linear-gradient(135deg, ${a} 0%, ${b} 100%)`;
			wrap.textContent = initialsFor(name);
			return wrap;
		}

		function initialsFor(name) {
			if (!name) return "?";
			const cleaned = String(name).trim();
			if (!cleaned) return "?";
			const words = cleaned.split(/\s+/).filter(Boolean);
			if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
			return (words[0][0] + words[1][0]).toUpperCase();
		}

		function gradientFor(name) {
			let h = 0;
			const s = String(name || "");
			for (let i = 0; i < s.length; i++) {
				h = (h * 31 + s.charCodeAt(i)) >>> 0;
			}
			return GRADIENTS[h % GRADIENTS.length];
		}

		function formatDateRange(start, end) {
			if (!start && !end) return "";
			if (start && !end) return formatDate(start);
			if (!start && end) return formatDate(end);

			const sameYear = start.getFullYear() === end.getFullYear();
			const sameMonth = sameYear && start.getMonth() === end.getMonth();
			const sameDay = sameMonth && start.getDate() === end.getDate();

			if (sameDay) return formatDate(start);

			if (sameMonth) {
				const month = start.toLocaleString("en-US", { month: "short" });
				return `${month} ${start.getDate()}–${end.getDate()}, ${start.getFullYear()}`;
			}

			if (sameYear) {
				const s = start.toLocaleString("en-US", { month: "short", day: "numeric" });
				const e = end.toLocaleString("en-US", { month: "short", day: "numeric" });
				return `${s} – ${e}, ${start.getFullYear()}`;
			}

			return `${formatDate(start)} – ${formatDate(end)}`;
		}

		function formatDate(d) {
			return d.toLocaleString("en-US", {
				month: "short",
				day: "numeric",
				year: "numeric"
			});
		}

		function onTileClick(site) {
			if (!site || typeof site.url !== "string" || !site.url.startsWith("https://")) {
				console.warn("Invalid site URL:", site);
				return;
			}

			selectedSite = site;

			localStorage.setItem("selectedUrl", site.url);
			localStorage.setItem("selectedName", site.name || "");
			localStorage.setItem("selectedLogo", site.logoUrl || "");

			if (view === VIEW_SHOWS) {
				// Shows tab: hand off to Home tab, which owns the redirect.
				navigateToTab(VIEW_HOME);
				return;
			}

			redirect(site.url);
		}

		function showLoadingAndRedirect(site) {
			renderLoader(site);

			const overlay = document.getElementById("loaderOverlay");
			overlay.classList.add("show");

			const fill = document.getElementById("loaderFill");
			requestAnimationFrame(() => {
				fill.style.width = "0%";
				requestAnimationFrame(() => {
					fill.style.width = "100%";
				});
			});

			redirectTimer = window.setTimeout(() => {
				redirect(site.url);
			}, REDIRECT_DELAY_MS);
		}

		function renderLoader(site) {
			const logoHost = document.getElementById("loaderLogo");
			logoHost.innerHTML = "";
			logoHost.appendChild(buildLogo({
				logoUrl: site.logoUrl || "",
				name: site.name || ""
			}));

			document.getElementById("loaderTitle").textContent = site.name || "Opening…";
			document.getElementById("loaderSubtitle").textContent = "Opening…";
		}

		function cancelLoading() {
			if (redirectTimer) {
				clearTimeout(redirectTimer);
				redirectTimer = null;
			}

			localStorage.removeItem("selectedUrl");
			localStorage.removeItem("selectedName");
			localStorage.removeItem("selectedLogo");

			const overlay = document.getElementById("loaderOverlay");
			overlay.classList.remove("show");

			navigateToTab(VIEW_SHOWS);
		}

		function redirect(url) {
			let finalUrl = url;

			if (userEmail || userName) {
				const params = new URLSearchParams();
				if (userEmail) params.append("email", userEmail);
				if (userName) params.append("name", userName);
				finalUrl += finalUrl.includes("#") ? "&" + params.toString() : "#" + params.toString();
			}

			console.log("Redirecting to:", finalUrl);
			window.location.href = finalUrl;
		}
	</script>
